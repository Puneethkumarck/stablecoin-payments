name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: Spotless check
        run: ./gradlew spotlessCheck --build-cache

  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            merchant-onboarding:merchant-onboarding:
              - 'merchant-onboarding/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            merchant-iam:merchant-iam:
              - 'merchant-iam/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            api-gateway-iam:api-gateway-iam:
              - 'api-gateway-iam/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            compliance-travel-rule:compliance-travel-rule:
              - 'compliance-travel-rule/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            fx-liquidity-engine:fx-liquidity-engine:
              - 'fx-liquidity-engine/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'

  test:
    needs: [spotless, changes]
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: All tests
        env:
          TESTCONTAINERS_REUSE_ENABLE: true
        run: |
          ./gradlew \
            :${{ matrix.service }}:test \
            :${{ matrix.service }}:jacocoTestReport \
            :${{ matrix.service }}:integrationTest \
            :${{ matrix.service }}:businessTest \
            --build-cache --parallel

  sonar:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      # Switch to Java 21 for Sonar — BouncyCastle multi-release JAR used by the
      # SonarQube plugin is not compatible with Java 25 instrumentation
      - name: Set up JDK 21 for SonarCloud
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew classes sonar --build-cache -Dsonar.token="$SONAR_TOKEN" -Dsonar.branch.name=${{ github.ref_name }}
