name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: Spotless check
        run: ./gradlew spotlessCheck --build-cache

  test:
    needs: spotless
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - merchant-onboarding:merchant-onboarding
          - merchant-iam:merchant-iam
          - api-gateway-iam:api-gateway-iam
          - compliance-travel-rule:compliance-travel-rule
          - fx-liquidity-engine:fx-liquidity-engine
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: Unit tests
        run: ./gradlew :${{ matrix.service }}:test :${{ matrix.service }}:jacocoTestReport --build-cache

      - name: Integration tests
        run: ./gradlew :${{ matrix.service }}:integrationTest --build-cache

      - name: Business tests
        run: ./gradlew :${{ matrix.service }}:businessTest --build-cache

  sonar:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      # Switch to Java 21 for Sonar — BouncyCastle multi-release JAR used by the
      # SonarQube plugin is not compatible with Java 25 instrumentation
      - name: Set up JDK 21 for SonarCloud
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew classes sonar --build-cache -Dsonar.token="$SONAR_TOKEN" -Dsonar.branch.name=${{ github.ref_name }}
