name: Mark Stale Issues and PRs

on:
  schedule:
    # Run every day at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale issues and PRs
        uses: actions/stale@v10
        with:
          # --- Stale Issue Settings ---
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 30 days and has been marked as stale.
            If it is still relevant, please leave a comment or update the issue.
            It will be automatically closed in 14 days if there is no further activity.
          close-issue-message: >
            This issue has been closed automatically after 44 days of inactivity.
            If you believe this is still relevant, please open a new issue with updated context.
          close-issue-reason: not_planned

          # --- Stale PR Settings ---
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been inactive for 14 days and has been marked as stale.
            Please rebase, resolve any conflicts, and update the PR if it is still intended to be merged.
            It will be automatically closed in 7 days if there is no further activity.
          close-pr-message: >
            This pull request has been closed automatically after 21 days of inactivity.
            If the work is still relevant, please open a new PR with the latest changes.

          # --- Exemptions ---
          # Issues/PRs with these labels will never be marked stale
          exempt-issue-labels: "pinned,security,in-progress,blocked,phase-1,phase-2"
          exempt-pr-labels: "pinned,security,in-progress,blocked,do-not-close"

          # Only process a limited number per run to stay within GitHub API rate limits
          operations-per-run: 100

          # Don't remove the stale label if the issue/PR gets activity
          remove-stale-when-updated: true
