spring:
  application:
    name: fiat-off-ramp

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s5_fiat_off_ramp}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          auto-create-topics: false
      bindings:
        fiat-payout-initiated-out-0:
          destination: fiat.payout.initiated
        fiat-payout-completed-out-0:
          destination: fiat.payout.completed
        fiat-payout-failed-out-0:
          destination: fiat.payout.failed

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "offramp_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: fiat-off-ramp
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8087}
  servlet:
    context-path: /off-ramp
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: S5 Fiat Off-Ramp API
    description: Stablecoin redemption and fiat disbursement for outbound payments
    version: 1.0.0

app:
  security:
    enabled: false
  redemption:
    circle:
      base-url: ${CIRCLE_BASE_URL:https://api-sandbox.circle.com}
      api-key: ${CIRCLE_API_KEY:SAND_API_KEY_DEFAULT}
      destination-id: ${CIRCLE_DESTINATION_ID:default-wire-id}
      timeout-seconds: 10
  payout:
    modulr:
      webhook:
        webhook-secret: ${MODULR_WEBHOOK_SECRET:}
        tolerance-seconds: 300

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
