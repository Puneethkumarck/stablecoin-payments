spring:
  application:
    name: compliance-travel-rule

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s2_compliance}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          auto-create-topics: false
      bindings:
        compliance-result-out-0:
          destination: compliance.result
        sanctions-hit-out-0:
          destination: sanctions.hit

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "compliance_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: compliance-travel-rule
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /compliance
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: S2 Compliance & Travel Rule API
    description: Compliance checks, sanctions screening, AML analysis, and FATF Travel Rule enforcement
    version: 1.0.0

app:
  compliance:
    risk-scoring:
      kyc-tier1-penalty: 20
      high-value-penalty: 15
      aml-flag-penalty: 30
      cross-border-penalty: 10
      new-customer-penalty: 15
      high-corridor-risk-penalty: 20
      amount-to-limit-ratio-penalty: 10
      high-velocity-penalty: 15
      corridor-risk-scores:
        US-IR: 25
        US-KP: 30
        US-SY: 25
        US-CU: 20

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
