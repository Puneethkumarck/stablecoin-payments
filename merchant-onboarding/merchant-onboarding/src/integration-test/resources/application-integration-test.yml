spring:
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  temporal:
    workers:
      enabled: false

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.RootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.NonRootNamespaceAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.ServiceStubsAutoConfiguration
      - io.temporal.spring.boot.autoconfigure.TestServerAutoConfiguration

outbox:
  relay:
    fixed-delay-ms: 50

app:
  fallback-adapters:
    enabled: true

server:
  port: 0

logging:
  level:
    com.stablecoin.payments: DEBUG
    org.springframework.test: INFO
    org.testcontainers: INFO
