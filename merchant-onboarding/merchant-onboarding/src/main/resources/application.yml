spring:
  application:
    name: merchant-onboarding

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s11_merchant_onboarding}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  temporal:
    namespace: ${TEMPORAL_NAMESPACE:default}
    connection:
      target: ${TEMPORAL_HOST:localhost}:${TEMPORAL_PORT:7233}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          auto-create-topics: false
      bindings:
        merchant-activated-out-0:
          destination: merchant.activated
        merchant-applied-out-0:
          destination: merchant.applied
        merchant-suspended-out-0:
          destination: merchant.suspended
        merchant-closed-out-0:
          destination: merchant.closed
        merchant-kyb-passed-out-0:
          destination: merchant.kyb.passed
        merchant-kyb-failed-out-0:
          destination: merchant.kyb.failed
        merchant-corridor-approved-out-0:
          destination: merchant.corridor.approved

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "onboarding_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: merchant-onboarding
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /onboarding
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: S11 Merchant Onboarding API
    description: Merchant onboarding, KYB verification, and lifecycle management
    version: 1.0.0

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
