spring:
  application:
    name: payment-orchestrator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s1_payment_orchestrator}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.AutoDiscoveryProperties

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "orchestrator_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

temporal:
  server:
    address: ${TEMPORAL_ADDRESS:localhost:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}
  task-queue: payment-orchestrator-queue

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: payment-orchestrator
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /orchestrator
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: S1 Payment Orchestrator API
    description: Central payment lifecycle orchestration for cross-border stablecoin payments
    version: 1.0.0

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  temporal:
    worker:
      enabled: ${TEMPORAL_WORKER_ENABLED:true}
  payment:
    ttl-minutes: ${PAYMENT_TTL_MINUTES:30}
  services:
    compliance:
      url: ${COMPLIANCE_SERVICE_URL:http://localhost:8083/compliance}
    fx:
      url: ${FX_SERVICE_URL:http://localhost:8084/fx}

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
