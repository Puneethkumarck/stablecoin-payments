sonar.projectKey=Puneethkumarck_stablecoin-payments
sonar.organization=puneethkumarck
sonar.host.url=https://sonarcloud.io

sonar.projectName=Stablecoin Payments Platform
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.java.source=25

# Coverage report (generated by JaCoCo unit test task)
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml

# Exclude generated / boilerplate from analysis
sonar.exclusions=\
  **/entity/*Entity*.java,\
  **/mapper/*Mapper*.java,\
  **/*Application*.java,\
  **/config/*Config*.java,\
  **/fixtures/**

# Exclude test source dirs from main analysis (they appear in test metrics instead)
sonar.test.inclusions=\
  **/src/test/**,\
  **/src/integration-test/**,\
  **/src/business-test/**
