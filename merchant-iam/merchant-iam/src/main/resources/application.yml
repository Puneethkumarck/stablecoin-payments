spring:
  application:
    name: merchant-iam

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s13_merchant_iam}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: merchant-iam
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          auto-create-topics: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

merchant-iam:
  jwt:
    private-key-base64: ${JWT_PRIVATE_KEY_BASE64:}
    issuer: ${JWT_ISSUER:https://api.stablecoin-payments.dev}
    audience: ${JWT_AUDIENCE:payment-platform}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:3600}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:86400}
  jobs:
    invitation-expiry:
      fixed-delay-ms: ${INVITATION_EXPIRY_JOB_DELAY_MS:900000}
    session-cleanup:
      fixed-delay-ms: ${SESSION_CLEANUP_JOB_DELAY_MS:3600000}
  email:
    from: ${EMAIL_FROM:noreply@stablecoin-payments.dev}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:3000/invite}

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "merchantiam_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db,redis
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: merchant-iam
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
