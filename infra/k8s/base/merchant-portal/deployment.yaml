apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchant-portal
  namespace: stablebridge
  labels:
    app: merchant-portal
    service: merchant-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: merchant-portal
  template:
    metadata:
      labels:
        app: merchant-portal
        service: merchant-portal
    spec:
      containers:
        - name: merchant-portal
          image: nginx:alpine
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
