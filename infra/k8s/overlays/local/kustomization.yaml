apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replicas:
  - name: s10-api-gateway
    count: 1
  - name: s11-merchant-onboarding
    count: 1
  - name: s13-merchant-iam
    count: 1
  - name: merchant-portal
    count: 1
  - name: admin-portal
    count: 1

patches:
  # Merchant Portal — increase probe timeout (Next.js redirects cause slow responses)
  - target:
      kind: Deployment
      name: merchant-portal
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5

  # Admin Portal — increase probe timeout (Next.js redirects cause slow responses)
  - target:
      kind: Deployment
      name: admin-portal
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /admin
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /admin
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5

  # S10 — optimized for fast local startup
  - target:
      kind: Deployment
      name: s10-api-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "500m"
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: JAVA_TOOL_OPTIONS
            value: "-Xms256m -Xmx512m -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseSerialGC -Dspring.main.lazy-initialization=true"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 120
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60

  # S11 — optimized for fast local startup
  - target:
      kind: Deployment
      name: s11-merchant-onboarding
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "500m"
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: JAVA_TOOL_OPTIONS
            value: "-Xms256m -Xmx512m -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseSerialGC -Dspring.main.lazy-initialization=true"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 120
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60

  # S13 — optimized for fast local startup
  - target:
      kind: Deployment
      name: s13-merchant-iam
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "512Mi"
            cpu: "500m"
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: JAVA_TOOL_OPTIONS
            value: "-Xms256m -Xmx512m -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+UseSerialGC -Dspring.main.lazy-initialization=true"
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 120
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60
