spring:
  application:
    name: fiat-on-ramp

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/s3_fiat_on_ramp}
    username: ${DB_USER:sp_user}
    password: ${DB_PASS:sp_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
          auto-create-topics: false
      bindings:
        fiat-collected-out-0:
          destination: fiat.collected
        fiat-collection-failed-out-0:
          destination: fiat.collection.failed

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "onramp_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: fiat-on-ramp
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /on-ramp
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: S3 Fiat On-Ramp API
    description: Fiat collection, PSP integration, and refund management for inbound payments
    version: 1.0.0

app:
  security:
    enabled: false
  psp:
    provider: stripe
    stripe:
      base-url: https://api.stripe.com
      api-key: ${STRIPE_API_KEY:sk_test_default}
      timeout-seconds: 10
      webhook:
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_default}
        tolerance-seconds: 300

logging:
  level:
    com.stablecoin.payments: INFO
    org.springframework.security: WARN
