# CodeRabbit Configuration for stablebridge-platform
# Docs: https://docs.coderabbit.ai/configure/coderabbit-yaml

language: "en-US"

# Tone for review comments — concise and professional
tone_instructions: |
  Be concise and direct. Focus on actionable improvements.
  Use enterprise Java/Spring Boot terminology. Avoid repeating obvious things.
  Prioritise security issues first, then correctness, then design.

reviews:
  # Comment-only workflow — never block PR merges.
  # Claude Code autofix agent reads these comments and fixes critical/major issues.
  request_changes_workflow: false

  # Post a high-level summary on every PR
  high_level_summary: true

  # Include a poem at the end of summaries (set false to keep it serious)
  poem: false

  # Collapse walkthrough by default to reduce noise
  collapse_walkthrough: false

  # Review auto-generated or vendor files
  auto_review:
    enabled: true
    # Only auto-review PRs targeting main
    base_branches:
      - main
    # Skip drafts — only review when PR is ready
    drafts: false

  profile: "assertive"

  path_filters:
    # Ignore compiled output, Gradle caches, and generated code
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/generated/**"
    - "!**/*.class"
    - "!gradle/wrapper/**"
    - "!gradlew"
    - "!gradlew.bat"
    # Ignore local infra config (WireMock stubs, DB init scripts)
    - "!infra/local/**"

  path_instructions:
    # Merchant Onboarding — hexagonal architecture + KYB compliance focus
    - path: "merchant-onboarding/**"
      instructions: |
        This service follows strict hexagonal architecture.
        - Spring annotations (e.g. @Entity, @Table, @Column, @Transactional, @Value) are
          permitted in domain classes — do NOT flag these as architecture violations
        - All external calls go through ports (interfaces) in the domain layer
        - Adapters live in infrastructure/ and must implement domain ports
        - Controllers live in application.controller — never in a web/ package
        - Check for the outbox pattern: OutboxEvent entity + OutboxEventRepository + OutboxRelayJob
        - No wildcard imports allowed — every import must be fully qualified
        - Use static imports for assertions, enum constants, and factory methods
        - KYB and merchant PII data must never appear in logs
        - Saga steps must be idempotent

    # Merchant IAM — security-critical, extra scrutiny
    - path: "merchant-iam/**"
      instructions: |
        This is the identity and access management service — security is paramount.
        - Spring annotations (e.g. @Entity, @Table, @Column, @Transactional, @Value) are
          permitted in domain classes — do NOT flag these as architecture violations
        - Verify JWT validation is correct and tokens are verified on every request
        - Role assignments must be authorised — check for privilege escalation risks
        - Sensitive fields (tokens, secrets, passwords) must never be logged
        - All endpoints must have explicit authorisation annotations
        - No wildcard imports allowed
        - Check hexagonal architecture compliance (same rules as merchant-onboarding)

    # API Gateway & IAM — security-critical gateway service
    - path: "api-gateway-iam/**"
      instructions: |
        This is the API gateway with OAuth2/JWT authentication and API key management.
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture: controllers in application.controller, adapters in infrastructure/
        - Verify JWT validation, token revocation, and rate limiting logic
        - API keys and OAuth secrets must never be logged
        - All endpoints must have @Secured or @PreAuthorize
        - Redis caching must handle cache misses gracefully
        - No wildcard imports allowed

    # Compliance & Travel Rule — regulatory compliance
    - path: "compliance-travel-rule/**"
      instructions: |
        This service handles AML/sanctions screening and Travel Rule compliance.
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture compliance required
        - Sanctions screening must be fail-closed (reject on error, not pass)
        - All compliance decisions must be auditable (check audit trail)
        - PII data (names, addresses) must never appear in logs — use IDs only
        - Risk scoring logic must be deterministic and testable
        - No wildcard imports allowed

    # FX & Liquidity Engine — financial calculations
    - path: "fx-liquidity-engine/**"
      instructions: |
        This service handles FX rates, quotes, and liquidity pool management.
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture compliance required
        - All monetary calculations must use BigDecimal — NEVER double/float
        - Quote expiry and staleness must be enforced
        - Rate caching must handle stale data correctly
        - Liquidity pool operations must be thread-safe
        - No wildcard imports allowed

    # Payment Orchestrator — saga workflows
    - path: "payment-orchestrator/**"
      instructions: |
        This is the payment orchestration service using Temporal for saga workflows.
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture compliance required
        - Temporal workflows must be deterministic (no I/O, no System.currentTimeMillis())
        - Saga compensation must happen in LIFO order
        - Activity methods must be idempotent
        - Payment state transitions must be explicit and validated
        - No wildcard imports allowed

    # Fiat On-Ramp — payment collection
    - path: "fiat-on-ramp/**"
      instructions: |
        This service handles fiat payment collection (Stripe ACH, Open Banking).
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture compliance required
        - Collection status tracking must handle webhook idempotency
        - Monetary amounts must use BigDecimal
        - Provider webhooks must validate signatures
        - No wildcard imports allowed

    # Blockchain & Custody — crypto operations
    - path: "blockchain-custody/**"
      instructions: |
        This service handles blockchain transactions, custody, and transfer monitoring.
        - Spring annotations permitted in domain classes — do NOT flag as architecture violations
        - Hexagonal architecture compliance required
        - Private keys must NEVER appear in logs or error messages
        - Transaction signing must go through custody adapter (never direct)
        - Block confirmation polling must handle reorgs
        - Gas estimation must include safety margins
        - No wildcard imports allowed

    # GitHub Actions workflows — CI/CD hygiene
    - path: ".github/workflows/**"
      instructions: |
        - Ensure all action versions are pinned (prefer SHA or explicit version tags, not @latest)
        - Check for secret exposure — secrets must only be passed via env: or with:, never echoed
        - Verify permissions are minimal (least privilege per job)
        - Check for potential injection via ${{ github.event.* }} inputs

    # Gradle build files — dependency and build hygiene
    - path: "**/*.gradle.kts"
      instructions: |
        - Flag any newly added dependencies and ask if they are necessary
        - Ensure no test-scoped dependencies leak into main compile scope
        - Check for version catalog alignment (all versions should come from libs.versions.toml if present)
        - Wildcard dependency exclusions should be justified

    # Database migrations — irreversible changes need extra care
    - path: "**/db/migration/**"
      instructions: |
        - Flyway migrations must be immutable once merged — flag any modification to existing scripts
        - Destructive operations (DROP, TRUNCATE, DELETE without WHERE) must have a justification comment
        - Check that new columns have sensible defaults for existing rows
        - Verify index naming follows the project convention

    # Tests — coverage and quality
    - path: "**/*Test*.java"
      instructions: |
        - Every new public method should have at least one test
        - Integration tests must use @SpringBootTest or Testcontainers — no mocking of DB
        - Business tests should read like specifications (Gherkin-style naming preferred)
        - No hardcoded secrets or real PII in test fixtures
        - Assert on meaningful values — avoid assertTrue(result != null)

  finishing_touches:
    # Suggest adding docstrings to public API methods
    docstrings:
      enabled: true

chat:
  # Allow @coderabbitai commands in PR comments
  auto_reply: true
