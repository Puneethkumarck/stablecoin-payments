server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://sp-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: service

      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # Drop monitoring stack containers to avoid log loops
      - source_labels: ['__meta_docker_container_name']
        regex: '/(sp-prometheus|sp-loki|sp-promtail|sp-grafana|sp-tempo)'
        action: drop

    pipeline_stages:
      - docker: {}
